name: Skills manifest

on:
  pull_request:
    paths:
      - "skills/**"
      - "tools/gen_skills_lock.py"

jobs:
  verify-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify SKILLS.lock is current
        run: python tools/gen_skills_lock.py --check
